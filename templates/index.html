<!DOCTYPE html>
<html>

<head>

<title>Guitar Relative Tuner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="/static/script.js"></script>

<style>

body{
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
margin:0;
}

.container{
margin-top:60px;
}

h1{
font-size:38px;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

.tuning-grid{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.string-box{
display:flex;
flex-direction:column;
align-items:center;
}

.string-label{
font-size:14px;
opacity:0.7;
margin-bottom:5px;
}

input{
width:60px;
height:60px;
font-size:22px;
text-align:center;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 10px #38bdf8;
}

button{
background:#38bdf8;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.results{
margin-top:40px;
display:flex;
justify-content:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
width:400px;
}

.result-line{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.result-line:last-child{
border-bottom:none;
}

.fret{
color:#38bdf8;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1> Guitar Relative Tuning Calculator</h1>

<p class="subtitle">
Enter the <b>desired tuning</b> from lowest string to highest.
Assume the first string is already tuned.
</p>

<div class="tuning-grid">

<div class="string-box">
<div class="string-label">String 6</div>
<input id="s1" placeholder="E">
</div>

<div class="string-box">
<div class="string-label">String 5</div>
<input id="s2" placeholder="A">
</div>

<div class="string-box">
<div class="string-label">String 4</div>
<input id="s3" placeholder="D">
</div>

<div class="string-box">
<div class="string-label">String 3</div>
<input id="s4" placeholder="G">
</div>

<div class="string-box">
<div class="string-label">String 2</div>
<input id="s5" placeholder="B">
</div>

<div class="string-box">
<div class="string-label">String 1</div>
<input id="s6" placeholder="E">
</div>

</div>

<button onclick="calculate()">Calculate Tuning</button>

<div class="results">
<div class="card">


<div id="result"></div>

</div>
</div>

</div>

</body>
</html>
